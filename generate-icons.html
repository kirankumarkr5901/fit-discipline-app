<!DOCTYPE html>
<html>
<head><title>Generate PWA Icons</title></head>
<body>
<h2>Right-click each image and "Save image as..." to save as PNG</h2>
<h3>icon-192.png</h3>
<canvas id="c192" width="192" height="192"></canvas>
<h3>icon-512.png</h3>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  const r = s * 0.2;

  // Rounded rect background
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#1e3a5f');
  grad.addColorStop(1, '#0f0f1a');
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Fire emoji
  ctx.font = `${s * 0.55}px "Segoe UI Emoji", "Apple Color Emoji", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🔥', s / 2, s / 2 + s * 0.03);

  // "FD" text
  ctx.font = `bold ${s * 0.12}px system-ui, sans-serif`;
  ctx.fillStyle = '#ffffff';
  ctx.fillText('FD', s / 2, s * 0.88);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

// Auto-convert to downloadable links
['c192', 'c512'].forEach(id => {
  const canvas = document.getElementById(id);
  const link = document.createElement('a');
  link.download = id === 'c192' ? 'icon-192.png' : 'icon-512.png';
  link.href = canvas.toDataURL('image/png');
  link.textContent = `Download ${link.download}`;
  link.style.display = 'block';
  link.style.margin = '8px 0';
  link.style.fontSize = '18px';
  canvas.parentNode.insertBefore(link, canvas.nextSibling);
});
</script>
</body>
</html>
